name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Using a stable modern version for the build

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling
      - name: Clean dist
        run: rm -rf dist/
        
      - name: Build release distributions
        run: python -m build

      - name: Upload distributions as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [release-build]
    permissions:
      id-token: write # Mandatory for "Trusted Publishing" (no passwords needed!)
    
    environment:
      name: pypi
      url: https://pypi.org/p/servo_tester

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
